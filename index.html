<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS Agregator</title>
  </head>
  <body>
    <section>
      <div class="container">
        <p class="name">RSS агрегатор</p>
        <p>Начните читать RSS сегодня! Это легко, это красиво.</p>
        <div class="row">
          <div class="col">
            <form>
              <label for="rss-link"></label>
              <input type="text" id="rss-link" placeholder="Ссылка RSS" />
            </form>
          </div>
          <div class="col">
            <button type="submit">Добавить</button>
          </div>
        </div>
        <p class="example">Пример: https://ru.hexlet.io/lessons.rss</p>
      </div>
    </section>
    <section>
      <div>
        <div></div>
        <div></div>
      </div>
    </section>
  </body>
</html>
